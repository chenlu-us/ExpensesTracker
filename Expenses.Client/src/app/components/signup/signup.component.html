
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card mt-5">
                <div class="card-header bg-primary bg-opacity-75">
                    <h3 class="card-title mb-0 fw-semibold">Sign Up</h3>
                </div>
                <div class="card-body">
                    <div *ngIf="errorMessage" class="alert alert-danger">
                        {{ errorMessage }}  
                    </div>

                    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" [ngClass]="{'is-invalid':haserror('email','required') || haserror('email','email')}" formControlName="email">
                            <div class="invalid-feedback" *ngIf="haserror('email','required')">Email is required.</div>
                            <div class="invalid-feedback" *ngIf="haserror('email','email')">Please enter a valid email address.</div>
                        </div>                        
                            

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" formControlName="password" [ngClass]="{'is-invalid':haserror('password','required') || haserror('password','minlength')}">    
                            <div class="invalid-feedback" *ngIf="haserror('password','required')">Password is required.</div>
                            <div class="invalid-feedback" *ngIf="haserror('password','minlength')">Password must be at least 6 characters long.</div>                        
                        </div>
                        

                        <div class="mb-3">
                            <label for="confirmpassword" class="form-label fw-medium">Confirm Password</label>
                            <input type="password" id="confirmpassword" class="form-control" formControlName="confirmpassword" [ngClass]="{'is-invalid':haserror('confirmpassword','required') || signupForm.hasError('passwordMismatch') && signupForm.get('confirmpassword')?.touched}">   
                            <div class="invalid-feedback" *ngIf="haserror('confirmpassword','required')">Please confirm your password.</div>
                            <div class="invalid-feedback" *ngIf="signupForm.hasError('passwordMismatch') && signupForm.get('confirmpassword')?.touched">Passwords do not match.</div>                        
                        </div>
                        

                        <div>
                             <button type="submit" class="btn btn-primary" [disabled]="signupForm.invalid">Sign Up</button>
                        </div>     
                        
                        <div class="text-center mt-3">
                            <small>Already have an account? <a routerLink="/login">Log in</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
